<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>머니박스레밋 2026 여름 특별 프로모션</title>
<meta property="og:title" content="머니박스레밋 2026 여름 특별 프로모션">
<style>
  body{margin:0;font-family:"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",system-ui,sans-serif;
       background:linear-gradient(135deg,#1a6dff,#0d4fc4);color:#fff;min-height:100vh;
       display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
  .sp{width:42px;height:42px;border:4px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;
      animation:spin .9s linear infinite;margin-bottom:18px}
  @keyframes spin{to{transform:rotate(360deg)}}
  a{color:#fff;font-weight:800;text-decoration:underline;font-size:1.1rem;display:inline-block;padding:10px 16px}
</style>
<script>
(function(){
  try{
    var ua = navigator.userAgent || "";
    var mobUA = /Mobi|Android|iPhone|iPod|IEMobile|BlackBerry|Opera Mini|Windows Phone/i.test(ua);
    var narrow = (window.matchMedia && window.matchMedia("(max-width:768px)").matches)
                 || (window.innerWidth && window.innerWidth <= 768);
    var dest = (mobUA || narrow) ? "promo-mobile.html" : "promo-pc.html";
    location.replace(dest);
  }catch(e){}
})();
</script>
</head>
<body>
  <div class="sp"></div>
  <p>머니박스레밋 2026 여름 프로모션으로 이동 중…</p>
  <noscript>
    <p>아래에서 선택해 주세요</p>
    <p><a href="promo-mobile.html">📱 모바일</a> &nbsp;·&nbsp; <a href="promo-pc.html">💻 PC</a></p>
  </noscript>
</body>
</html>
